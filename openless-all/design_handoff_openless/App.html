<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>OpenLess</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="icon" href="AppIcon.png" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background:
        radial-gradient(120% 80% at 0% 0%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%),
        radial-gradient(100% 70% at 100% 100%, rgba(37,99,235,0.06) 0%, rgba(37,99,235,0) 55%),
        linear-gradient(180deg, #e8e8ec 0%, #d6d8dc 100%);
      display: grid;
      place-items: center;
      font-family: var(--ol-font);
    }
    /* App fills the viewport but is resizable when embedding into an electron/tauri shell */
    .ol-app {
      width: min(100vw, 1240px);
      height: min(100vh, 800px);
      box-sizing: border-box;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="data.js"></script>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f5f5f7"/>
          <stop offset="100%" stop-color="#d8dae0"/>
        </linearGradient>
      </defs>
      <rect width="600" height="400" fill="url(#bg)"/>
      <g transform="translate(180, 130)">
        <rect x="0" y="0" width="240" height="140" rx="20" fill="#0a0a0b"/>
        <circle cx="32" cy="32" r="6" fill="#ff5f57"/>
        <circle cx="52" cy="32" r="6" fill="#febc2e"/>
        <circle cx="72" cy="32" r="6" fill="#28c840"/>
        <text x="120" y="80" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="600">OpenLess</text>
        <text x="120" y="105" text-anchor="middle" fill="#9aa0a6" font-family="system-ui" font-size="11">本地说出，本地落字</text>
      </g>
    </svg>
  </template>
</head>
<body>
  <div id="app" class="ol-app"></div>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="capsule.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="variants.jsx"></script>

  <script type="text/babel">
    // Auto-detect host OS for the window chrome (mac vs win).
    // In a real Electron/Tauri shell, replace this with the IPC platform check.
    const detectOS = () => {
      const ua = navigator.userAgent || '';
      if (/Mac|iPhone|iPad|iPod/.test(ua)) return 'mac';
      if (/Windows/.test(ua)) return 'win';
      return 'mac'; // sensible default
    };

    function Boot() {
      const os = detectOS();
      const { WindowChrome, FloatingShell } = window;
      return (
        <WindowChrome os={os} title="OpenLess" height="100%">
          <FloatingShell os={os} initialTab="overview" />
        </WindowChrome>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<Boot />);
  </script>
</body>
</html>
